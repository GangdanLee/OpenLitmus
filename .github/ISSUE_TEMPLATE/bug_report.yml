name: Bug Report
description: Report inaccurate scoring anchors or broken tooling
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Which project were you evaluating? Which indicator/anchor was affected?
